<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Agro Forte, Futuro Sustentável</h1>
    <p>O poder da nossa agricultura jogando no mesmo time do futuro!</p>

    <div class="campo">
        <div class="linha-meio"></div>
        <div class="circulo-central"></div>
        <div class="gol-esquerdo"></div>
        <div class="gol-direito"></div>

        <div id="milho" class="personagem" title="Milho">🌽</div>
        <div id="soja" class="personagem" title="Soja">🌱</div>

        <div id="bola" class="bola">⚽</div>
    </div>

    <div class="controles">
        <button id="btn-milho" onclick="chuteDoMilho()">Milho Chuta!</button>
        <button id="btn-reset" onclick="reiniciar()">Meio de Campo</button>
        <button id="btn-soja" onclick="chuteDaSoja()">Soja Chuta!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
