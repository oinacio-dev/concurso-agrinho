<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 x Copa do Mundo</title>
    
    <style>
        /* --- ESTILIZAÇÃO (O seu style.css) --- */
        :root {
            --verde-agro: #2e7d32;
            --amarelo-copa: #fbc02d;
            --azul-tech: #1565c0;
            --claro: #f4f6f9;
            --escuro: #212121;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--claro);
            color: var(--escuro);
            line-height: 1.6;
        }

        header {
            background-color: var(--verde-agro);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        header .logo span {
            color: var(--amarelo-copa);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--amarelo-copa);
        }
